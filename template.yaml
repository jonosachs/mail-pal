# CloudFormation/SAM template
AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: python3.13
    Timeout: 60
    Environment:
      Variables:
        APP_ENV: prod
        AWS_SECRETS_MAN: life-admin/secrets
        REGION: ap-southeast-2
        AWS_LAMBDA_LOG_LEVEL: INFO

Resources:
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: life-admin-dependencies
      ContentUri: layers/dependencies/
      CompatibleRuntimes:
        - python3.13
    Metadata:
      BuildMethod: python3.13

  SlackHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Environment:
        Variables:
          SLACK_WORKER_FUNCTION_NAME: !Ref SlackWorkerFunction
      CodeUri: src/
      Handler: functions.slack.handler.lambda_handler
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:life-admin/secrets-9MlbNy"
        - Statement:
            Effect: Allow
            Action: lambda:InvokeFunction 
            # Get the generated Lambda ARN for the resource named SlackWorkerFunction.
            Resource: !GetAtt SlackWorkerFunction.Arn 
      Events:
        SlackEvent: # creates the API Gateway
          Type: Api
          Properties:
            Path: /slack
            Method: post


  SlackWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions.slack.worker.worker_handler
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:life-admin/secrets-9MlbNy"
        - Statement:
            Effect: Allow
            Action: 
              - dynamodb:PutItem
              - dynamodb:DeleteItem
            Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Declined"



  RunPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions.pipeline.handler.lambda_handler
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:life-admin/secrets-9MlbNy"
        - Statement:
            Effect: Allow
            Action: dynamodb:Scan
            Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Declined"
      Events:
        ScheduledRun: # creates the EventBridge rule
          Type: Schedule
          Properties:
            Schedule: cron(0 9 * * ? *)

Outputs:
  SlackHandlerUrl:
    Description: API Gateway URL for Slack interactions
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/slack"
